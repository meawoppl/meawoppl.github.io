name: Validate Art Ideas

on:
  push:
    branches: [master]
    paths:
      - "public/art-ideas/data/**"
      - "scripts/art-ideas/**"
      - ".github/workflows/validate-art-ideas.yml"
  pull_request:
    branches: [master]
    paths:
      - "public/art-ideas/data/**"
      - "scripts/art-ideas/**"
      - ".github/workflows/validate-art-ideas.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install jsonschema

      - name: Validate art-ideas data
        run: python scripts/art-ideas/validate.py
